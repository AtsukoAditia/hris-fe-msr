name: Organization Mobile Acceptance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: organization-mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mobile-acceptance:
    name: Pixel 5 and iPhone 13
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      VITE_API_BASE_URL: http://127.0.0.1:4173/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile acceptance tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: organization-mobile-playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload mobile test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: organization-mobile-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
