name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Node 20 / React
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      VITE_API_BASE_URL: http://localhost:8000/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            echo "::warning::package-lock.json is missing; using npm install until a lockfile is committed."
            npm install --no-audit --no-fund
          fi

      - name: Lint changed source files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t SOURCE_FILES < <(git ls-files 'src/*.js' 'src/*.jsx' 'src/**/*.js' 'src/**/*.jsx')
          else
            mapfile -t SOURCE_FILES < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "${{ github.sha }}" -- 'src/*.js' 'src/*.jsx' 'src/**/*.js' 'src/**/*.jsx')
          fi

          if [ "${#SOURCE_FILES[@]}" -eq 0 ]; then
            echo "No changed JavaScript or JSX source files to lint."
            exit 0
          fi

          printf 'Linting %s\n' "${SOURCE_FILES[@]}"
          npx eslint --report-unused-disable-directives --max-warnings 0 "${SOURCE_FILES[@]}"

      - name: Run component tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-results
          npm test 2>&1 | tee test-results/component-tests.log

      - name: Upload component test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-component-test-log
          path: test-results/component-tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build production bundle
        run: npm run build
