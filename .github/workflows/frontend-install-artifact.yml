name: Frontend Install Artifact

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false
      - name: Capture npm install output
        shell: bash
        run: |
          set +e
          npm install --no-audit --no-fund > npm-install.log 2>&1
          echo "$?" > npm-install-status.txt
          exit 0
      - name: Upload install diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: frontend-install-diagnostics
          path: |
            npm-install.log
            npm-install-status.txt
          retention-days: 1
