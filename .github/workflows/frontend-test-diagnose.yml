name: Frontend Test Diagnose

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false
      - name: Diagnose npm install
        run: npm install --no-audit --no-fund --loglevel error
