name: Overtime navigation sync

on:
  push:
    branches:
      - feat/overtime-frontend

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/overtime-frontend
      - name: Register route and sidebar item
        run: |
          python3 - <<'PY'
          from pathlib import Path

          routes = Path('src/routes/index.jsx')
          content = routes.read_text()
          import_line = "import OvertimePage from '../pages/overtime/OvertimePage'\n"
          anchor = "import LeaveMasterPage from '../pages/leave/LeaveMasterPage'\n"
          if import_line not in content:
              content = content.replace(anchor, anchor + import_line)
          route_line = '        <Route path="/overtime" element={<OvertimePage />} />\n'
          route_anchor = '        <Route path="/leave" element={<LeavePage />} />\n'
          if route_line not in content:
              content = content.replace(route_anchor, route_anchor + route_line)
          routes.write_text(content)

          sidebar = Path('src/components/layout/Sidebar.jsx')
          content = sidebar.read_text()
          nav_line = "  { path: '/overtime', label: 'Lembur', icon: '⏱️' },\n"
          nav_anchor = "  { path: '/leave', label: 'Cuti', icon: '🌴' },\n"
          if nav_line not in content:
              content = content.replace(nav_anchor, nav_anchor + nav_line)
          sidebar.write_text(content)
          PY
      - name: Commit navigation changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/index.jsx src/components/layout/Sidebar.jsx
          git diff --cached --quiet || git commit -m "feat(overtime): register route and navigation"
          git push origin HEAD:feat/overtime-frontend
